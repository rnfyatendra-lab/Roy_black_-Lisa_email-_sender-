<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Bulk Mail Launcher</title>

  <link rel="stylesheet"
        href="style.css">

</head>

<body>

<div class="container">

  <div class="logo">
    📨
  </div>

  <div class="grid">

    <input
      id="senderName"
      placeholder="Sender Name">

    <input
      id="gmail"
      placeholder="Your Gmail">

    <input
      id="appPassword"
      type="password"
      placeholder="App Password">

    <input
      id="subject"
      placeholder="Professional Subject">

    <textarea
      id="message"
      placeholder="Professional Message"></textarea>

    <textarea
      id="emails"
      placeholder="Recipients"></textarea>

  </div>

  <div class="buttons">

    <button
      class="send-btn"
      onclick="sendEmails()">

      Send All

    </button>

    <button
      class="logout-btn"
      ondblclick="logoutUser()">

      Logout

    </button>

  </div>

  <p class="logout-text">
    Double-click to logout
  </p>

  <div class="stats">

    <div class="box">
      <h2>Total</h2>
      <span id="total">0</span>
    </div>

    <div class="box">
      <h2>Sent</h2>
      <span class="green"
            id="sent">0</span>
    </div>

    <div class="box">
      <h2>Failed</h2>
      <span class="red"
            id="failed">0</span>
    </div>

    <div class="box">
      <h2>Status</h2>
      <span id="status">
        Idle
      </span>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
