<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bulk Mail Sender</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main-box">

  <div class="top-grid">

    <input
      type="text"
      id="senderName"
      placeholder="Alex"
    >

    <input
      type="email"
      id="gmail"
      placeholder="yourgmail@gmail.com"
    >

    <input
      type="password"
      id="appPassword"
      placeholder="App Password"
    >

    <input
      type="text"
      id="subject"
      placeholder="Directory"
    >

    <textarea
      id="message"
      placeholder="Write message here..."
    ></textarea>

    <textarea
      id="emails"
      placeholder="Enter emails here..."
    ></textarea>

  </div>

  <div class="button-row">

    <button
      class="send-btn"
      onclick="sendEmails()"
    >
      Send All
    </button>

    <button
      class="logout-btn"
      onclick="logoutNow()"
    >
      Logout
    </button>

  </div>

  <p class="logout-text">
    Double-click logout button
  </p>

  <div class="stats-grid">

    <div class="card">
      <h3>Total</h3>
      <h1 id="total">0</h1>
    </div>

    <div class="card">
      <h3>Sent</h3>
      <h1
        id="sent"
        class="green"
      >
        0
      </h1>
    </div>

    <div class="card">
      <h3>Failed</h3>
      <h1
        id="failed"
        class="red"
      >
        0
      </h1>
    </div>

    <div class="card">
      <h3>Status</h3>
      <h1
        id="status"
        class="status-text"
      >
        Ready
      </h1>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
