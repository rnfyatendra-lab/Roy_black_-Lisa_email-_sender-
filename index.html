<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bulk Mail Launcher</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="main-box">

    <div class="logo">
      📧
    </div>

    <div class="grid-box">

      <input
        type="text"
        id="senderName"
        placeholder="Sender Name"
      />

      <input
        type="email"
        id="gmail"
        placeholder="Your Gmail"
      />

      <input
        type="password"
        id="appPassword"
        placeholder="App Password"
      />

      <input
        type="text"
        id="subject"
        placeholder="Subject"
      />

      <textarea
        id="message"
        placeholder="Message Body"
      ></textarea>

      <textarea
        id="emails"
        placeholder="Recipients (comma or newline)"
      ></textarea>

    </div>

    <div class="button-row">

      <button
        class="send-btn"
        onclick="sendEmails()"
      >
        Send All
      </button>

      <button
        class="logout-btn"
        ondblclick="logout()"
      >
        Logout
      </button>

    </div>

    <p class="logout-text">
      Double-click to logout
    </p>

    <div class="stats-grid">

      <div class="stat-box">
        <h3>Total</h3>
        <span id="total">0</span>
      </div>

      <div class="stat-box">
        <h3>Sent</h3>
        <span id="sent" class="green">0</span>
      </div>

      <div class="stat-box">
        <h3>Failed</h3>
        <span id="failed" class="red">0</span>
      </div>

      <div class="stat-box">
        <h3>Status</h3>
        <span id="status">Idle</span>
      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
