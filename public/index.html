<!DOCTYPE html>
<html>
<head>

<title>Railway Bulk Mailer</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<h1>🚀 Railway Bulk Mailer</h1>

<div class="grid">

<input id="senderName" placeholder="Sender Name">

<input id="gmail" placeholder="Your Gmail">

<input id="appPassword" type="password" placeholder="App Password">

<input id="subject" placeholder="Subject">

<textarea id="message" placeholder="Message Body"></textarea>

<textarea id="recipients" placeholder="Recipients (comma or newline)"></textarea>

</div>

<button id="sendBtn">Send All</button>

<div id="result"></div>

</div>

<script src="app.js"></script>

</body>
</html>
