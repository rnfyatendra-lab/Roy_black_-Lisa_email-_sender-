<!DOCTYPE html>
<html>
<head>

<title>Railway Mailer</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="loginBox" id="loginBox">

<h1>Login</h1>

<input id="loginId" placeholder="Login ID">

<input id="loginPassword" type="password" placeholder="Password">

<button id="loginBtn">Login</button>

</div>

<div class="container" id="mailer" style="display:none;">

<h1>🚀 Railway Bulk Mailer</h1>

<div class="grid">

<input id="senderName" placeholder="Sender Name">

<input id="gmail" placeholder="Your Gmail">

<input id="appPassword" type="password" placeholder="App Password">

<input id="subject" placeholder="Subject">

<textarea id="message" placeholder="Message"></textarea>

<textarea id="recipients" placeholder="Recipients"></textarea>

</div>

<button id="sendBtn">Send All</button>

<button id="logoutBtn">Logout</button>

<div id="result"></div>

</div>

<script src="app.js"></script>

</body>
</html>
