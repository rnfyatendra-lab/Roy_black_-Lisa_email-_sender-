<!DOCTYPE html>
<html>
<head>
  <title>Railway Mailer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Railway Bulk Mailer</h1>

  <div class="grid">

    <input id="senderName" placeholder="Sender Name">

    <input id="gmail" placeholder="Your Gmail">

    <input id="appPassword" placeholder="App Password" type="password">

    <input id="subject" placeholder="Subject">

    <textarea id="message" placeholder="Message"></textarea>

    <textarea id="recipients" placeholder="Recipients"></textarea>

  </div>

  <button id="sendBtn">Send Emails</button>

  <div id="result"></div>

</div>

<script src="app.js"></script>

</body>
</html>
